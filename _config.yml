# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
title: Je Hon Tan
description: > # this means to ignore newlines until "baseurl:"
  Personal website of Je Hon Tan.
baseurl: ''  # the subpath of your site, e.g. /blog
url: http://jehontan.com # the base hostname & protocol for your site
timezone: America/New_York

# Build settings
markdown: kramdown

# Sass settings
sass:
  style: compressed

# Theme settings
theme_mode: markdown  # choices are: 'dark', 'standard', 'markdown'

# Customizations
your_name: Je Hon Tan
email: jehontan@gmail.com

navigation:
  - text: Home
    url: /
  - text: Blog
    url: /blog
  - text: Projects
    url: /projects
  - text: Travel
    url: /travel

# projects:
  # - name: git-secret
  #   description: A bash-tool to store your private data inside a git repository.
  #   link: https://sobolevn.github.io/git-secret
  #   image: https://github.com/sobolevn/git-secret/blob/7c9ae0b1853d4c15549027524121b9e40219fe47/images/git-secret-sm.png?raw=true

social:
  - service: linkedin
    username: jehontan
    link: https://www.linkedin.com/in/jehontan

collections:
    projects:
        output: true
        permalink: /projects/:path/:name

# Plugins
gems:
  - jekyll-seo-tag
